services:
  - type: web
    name: django-todo-app
    runtime: python3
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput"
    startCommand: "python manage.py runserver 0.0.0.0:$PORT"
    envVars:
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: django-todo-app.onrender.com
      - key: SECRET_KEY
        generateValue: true